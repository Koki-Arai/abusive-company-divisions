# ============================================================
#  params/type_space.yaml
#  濫用的会社分割：多次元スクリーニング・モデル 共通パラメータ
#  第3節・第4節の理論設定に対応
# ============================================================

# --- 型空間の事前確率 (群①) ---
prior:
  lambda_G: 0.55   # 純正型 (v>0, w=0)
  lambda_M: 0.25   # 混合型 (v>0, w>0)
  lambda_B: 0.20   # 濫用型 (v=0, w>0)

# --- 条件付シグナル分布 (群②) ---
# δ: 承継比率の歪み ∈ [0,1]
signal_delta:
  G: {mu: 0.05, sigma: 0.05}   # 純正型：歪みほぼゼロ
  M: {mu: 0.25, sigma: 0.10}   # 混合型：中程度
  B: {mu: 0.55, sigma: 0.15}   # 濫用型：大

# ρ: 情報開示充足度 ∈ [0,1]  → Beta分布 (alpha, beta)
signal_rho:
  G: {alpha: 18.0, beta: 2.0}  # 純正型：高い開示（≈0.90）
  M: {alpha:  5.0, beta: 5.0}  # 混合型：中程度（≈0.50）
  B: {alpha:  2.0, beta: 18.0}  # 濫用型：低い開示（≈0.10）

# φ: 承継会社純資産（百万円）→ 正規分布
signal_phi:
  G: {mu: 80.0,  sigma: 30.0}  # 純正型：弁済能力あり
  M: {mu:  5.0,  sigma: 25.0}  # 混合型：境界域
  B: {mu: -60.0, sigma: 30.0}  # 濫用型：債務超過

# σ: 後続処分シグナル ∈ {0,1} → Bernoulli
signal_sigma:
  G: {p: 0.03}   # 純正型：ほぼ発生しない
  M: {p: 0.35}   # 混合型：中程度
  B: {p: 0.85}   # 濫用型：高頻度で発生

# --- 閾値パラメータ (群③) ---
thresholds:
  kappa_P: 0.25   # 価額填補手段の発動閾値確率
  kappa_A: 0.50   # 否認権の発動閾値確率
  kappa_F: 0.75   # 複合救済の発動閾値確率

# --- 費用・便益パラメータ (群④) ---
costs:
  k_P: 5.0     # 価額填補手続費用（百万円）
  k_A: 12.0    # 否認権行使費用（百万円）
  k_F: 20.0    # 複合救済費用（百万円）
  c_type1: 1.5 # 第一種過誤コスト比率（v 消滅コストの倍率）
  c_type2: 1.0 # 第二種過誤コスト比率（w 未回収コストの倍率）

# --- 事業価値・詐害移転額の代表値（百万円）---
value:
  v_G: 150.0   # 純正型の事業価値
  v_M:  60.0   # 混合型の事業価値
  v_B:   0.0   # 濫用型の事業価値
  w_M:  40.0   # 混合型の詐害移転額
  w_B: 100.0   # 濫用型の詐害移転額

# v-w トレードオフ曲線の閾値（命題5）
tradeoff:
  alpha: 2.0   # P/A 境界: v > alpha * w → P 最適
  beta:  0.8   # A/F 境界: v < beta  * w → F 最適

# --- 資産散逸過程パラメータ (群⑥) ---
asset_dissipation:
  A_N_init: 80.0       # 初期現存資産（百万円）
  drift_sigma0: 0.0    # σ=0 時のドリフト（ランダムウォーク）
  drift_sigma1: -8.0   # σ=1 時の月次ドリフト（百万円）
  diffusion: 5.0       # 拡散係数（百万円/月^0.5）
  T_months: 24         # シミュレーション期間（月）
  OC: 3.0              # 機会費用（百万円）

# --- 乱数シード ---
seed: 42
